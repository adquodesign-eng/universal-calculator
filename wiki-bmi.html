const CALC_ANCHOR = 'bmi';
Object.keys(WIKI).forEach(function(l) {
  if(WIKI[l] && WIKI[l].title) window.PAGE_TITLES[l] = WIKI[l].title + ' – Universal Calculator';
});

function renderPage(lang) {
  const d = WIKI[lang] || WIKI['en'] || WIKI['de'];
  if (!d) return;
  const main = document.getElementById('wiki-main');
  
  const blogLink = `<a href="blog.html?lang=${lang}">${d.bc_blog || 'Blog'}</a>`;
  const calcBtn = d.calc_label && CALC_ANCHOR ?
    `<div class="cta-box"><p>${d.calc_label}</p><a href="universal-calculator.html#${CALC_ANCHOR}?lang=${lang}">${d.calc_label} →</a></div>` : '';
  
  // Build table
  let tableHtml = '';
  if (d.table_h && d.table_r) {
    const ths = d.table_h.map(function(h){return `<th>${h}</th>`;}).join('');
    const trs = d.table_r.map(function(r){
      return '<tr>' + r.map(function(c){return `<td>${c}</td>`;}).join('') + '</tr>';
    }).join('');
    tableHtml = `<h2>Vergleichsübersicht</h2><div class="table-wrap"><table><tr>${ths}</tr>${trs}</table></div>`;
  }
  
  // Build quiz
  let quizHtml = '';
  if (d.quiz && d.quiz.length) {
    const answers = d.quiz.map(function(q){return q.ans;});
    const qItems = d.quiz.map(function(q, i) {
      const opts = q.opts.map(function(o, j) {
        return `<label><input type="radio" name="q${i}" value="${j}"> ${o}</label>`;
      }).join('');
      return `<div class="quiz-q"><p>${i+1}. ${q.q}</p><div class="quiz-opt">${opts}</div></div>`;
    }).join('');
    quizHtml = `<div class="quiz-card"><h2>${d.quiz_title || '🧠 Quiz'}</h2>
      <form id="wiki-quiz">
        ${qItems}
        <button type="button" class="quiz-submit" onclick="checkWikiQuiz(${JSON.stringify(answers)}, '${(d.pass_msg||'').replace(/'/g,'\'')}',' ${(d.fail_msg||'').replace(/'/g,'\'')}')">${d.submit || 'Submit'}</button>
        <div class="quiz-result" id="wiki-quiz-res"></div>
      </form>
    </div>`;
  }
  
  // Sources
  let sourcesHtml = '';
  if (d.sources && d.sources.length) {
    const lis = d.sources.map(function(s){return `<li>${s}</li>`;}).join('');
    sourcesHtml = `<div class="sources"><h2>${d.sources_title || '📚 Sources'}</h2><ol>${lis}</ol></div>`;
  }
  
  main.innerHTML = `
    <div class="bc">${blogLink} / ${d.title}</div>
    <div class="article-hdr">
      <span class="cat-badge">${d.cat}</span>
      <h1>${d.title}</h1>
      <div class="meta">${d.meta || ''}</div>
    </div>
    ${calcBtn}
    <div class="prose">${d.body}${tableHtml}</div>
    ${quizHtml}
    ${sourcesHtml}
  `;
}

function checkWikiQuiz(answers, passMsg, failMsg) {
  const form = document.getElementById('wiki-quiz');
  let correct = 0;
  answers.forEach(function(ans, i) {
    const sel = form.querySelector(`input[name="q${i}"]:checked`);
    if (sel && parseInt(sel.value) === ans) correct++;
  });
  const res = document.getElementById('wiki-quiz-res');
  res.className = 'quiz-result show ' + (correct === answers.length ? 'pass' : 'fail');
  res.textContent = correct + '/' + answers.length + ' — ' + (correct === answers.length ? passMsg : failMsg);
}

function setLang(l) {
  localStorage.setItem('lang', l);
  try {
    const u = new URL(window.location.href);
    u.searchParams.set('lang', l);
    history.replaceState(null, '', u.toString());
  } catch(e) {}
  applyNav(l);
  if (typeof renderPage === 'function') renderPage(l);
}

function getLang() {
  try {
    const p = new URLSearchParams(window.location.search);
    if (p.get('lang')) return p.get('lang');
  } catch(e) {}
  return localStorage.getItem('lang') || 'de';
}
