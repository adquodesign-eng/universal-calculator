*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

main{max-width:800px;margin:32px auto;padding:0 20px}

.card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:28px 32px;margin-bottom:20px}
.card h2{font-size:1.05rem;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px}

/* ── Page header ── */

.page-sub{color:var(--muted);font-size:.85rem;margin-bottom:28px;line-height:1.7}

/* ── Contact form ── */
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:5px}
.form-input{width:100%;padding:9px 13px;border:1px solid var(--border);border-radius:7px;background:var(--bg-deep);font-family:'IBM Plex Mono',monospace;font-size:.88rem;color:var(--text);outline:none;transition:border-color .15s}
.form-input:focus{border-color:var(--blue-bright);background:#fff}
textarea.form-input{resize:vertical;min-height:120px}
.btn-submit{width:100%;padding:11px;border:none;border-radius:7px;background:var(--blue-bright);color:#fff;font-family:'Space Grotesk',sans-serif;font-size:.95rem;font-weight:700;cursor:pointer;transition:background .15s;margin-top:4px}
.btn-submit:hover{background:#0095ee}
.success-msg{display:none;background:#F0FDF4;border:1px solid #86EFAC;border-radius:7px;padding:14px;text-align:center;color:#16A34A;font-weight:600;font-family:'Space Grotesk',sans-serif;margin-top:14px}
.info-box{background:var(--blue-soft);border-left:3px solid var(--blue-bright);border-radius:0 8px 8px 0;padding:12px 16px;font-size:.83rem;line-height:1.7}
.info-box a{color:var(--blue-bright);text-decoration:none;font-weight:600}

/* ── About page ── */
.hero{text-align:center;padding:40px 0 36px}
.hero h1{font-size:clamp(1.6rem,5vw,2.6rem);font-weight:700;line-height:1.2;margin-bottom:12px}
.hero h1 em{color:var(--blue-bright);font-style:normal}
.hero p{font-size:.95rem;color:var(--muted);line-height:1.8;max-width:540px;margin:0 auto}
.quote-box{background:linear-gradient(135deg,var(--blue-soft),var(--copper-soft));border:1px solid rgba(27,166,255,.18);border-radius:10px;padding:28px 32px;text-align:center;margin:0 0 20px}
.quote-text{font-size:1.05rem;font-weight:700;line-height:1.5;margin-bottom:8px;font-family:'Space Grotesk',sans-serif}

.quote-sub{font-size:.78rem;color:var(--muted)}
.section-h{font-size:1.05rem;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px;font-family:'Space Grotesk',sans-serif}
.prose{font-size:.86rem;color:var(--muted);line-height:1.8;margin-bottom:10px}
.values-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-top:16px}
.value-card{background:var(--bg-deep);border:1px solid var(--border);border-radius:8px;padding:16px 18px}
.value-icon{font-size:1.5rem;margin-bottom:8px}
.value-title{font-size:.85rem;font-weight:700;margin-bottom:4px;font-family:'Space Grotesk',sans-serif}
.value-desc{font-size:.78rem;color:var(--muted);line-height:1.6}
.timeline{display:flex;flex-direction:column;gap:14px}
.tl-item{display:flex;gap:16px;align-items:flex-start}
.tl-year{font-size:.72rem;font-weight:700;color:var(--blue-bright);min-width:38px;margin-top:3px;font-family:'Space Grotesk',sans-serif}
.tl-dot{width:10px;height:10px;border-radius:50%;background:var(--blue-bright);margin-top:5px;flex-shrink:0}
.tl-body h3{font-size:.88rem;font-weight:700;margin-bottom:3px;font-family:'Space Grotesk',sans-serif}
.tl-body p{font-size:.8rem;color:var(--muted);line-height:1.6}
.copper-tag{display:inline-block;background:var(--copper-soft);color:var(--copper);font-size:.72rem;font-weight:700;padding:2px 8px;border-radius:10px;font-family:'Space Grotesk',sans-serif}
