<!DOCTYPE html>
<html lang="de" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>FAQ – Universal Calculator</title>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1921537428828630" crossorigin="anonymous"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg-deep:#F6F8FC;--surface:#FFFFFF;--text:#1F2937;--muted:#6B7280;--blue-bright:#1BA6FF;--blue-soft:#E8F4FF;--copper:#C77A4A;--copper-soft:#F3E3DA;--border:#E5E7EB;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'IBM Plex Mono',monospace;background:var(--bg-deep);background-image:linear-gradient(rgba(27,166,255,0.06) 1px,transparent 1px),linear-gradient(90deg,rgba(27,166,255,0.06) 1px,transparent 1px);background-size:40px 40px;color:var(--text);min-height:100vh;padding:0 0 80px;}
h1,h2,h3,button,.btn{font-family:'Space Grotesk',sans-serif;}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;gap:12px;}
.logo{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:1.1rem;color:var(--blue-bright);text-decoration:none;}
.logo span{color:var(--copper);}
main{max-width:820px;margin:32px auto;padding:0 20px;}
.page-title{font-size:1.8rem;font-weight:700;margin-bottom:6px;}
.page-sub{color:var(--muted);font-size:0.85rem;margin-bottom:24px;}
.search-bar{display:flex;gap:10px;margin-bottom:16px;}
.search-bar input{flex:1;padding:10px 14px;border:1px solid var(--border);border-radius:8px;font-family:'IBM Plex Mono',monospace;font-size:0.9rem;background:var(--surface);color:var(--text);outline:none;}
.search-bar input:focus{border-color:var(--blue-bright);}
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px;}
.filter-btn{padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:var(--surface);font-family:'Space Grotesk',sans-serif;font-size:0.78rem;cursor:pointer;color:var(--muted);transition:0.15s;}
.filter-btn.active{background:var(--blue-bright);color:#fff;border-color:var(--blue-bright);}
.faq-item{background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:10px;overflow:hidden;}
.faq-q{padding:14px 18px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-family:'Space Grotesk',sans-serif;font-size:0.92rem;font-weight:600;gap:10px;}
.faq-q:hover{background:var(--blue-soft);}
.faq-arrow{font-size:0.8rem;transition:transform 0.2s;flex-shrink:0;}
.faq-item.open .faq-arrow{transform:rotate(180deg);}
.faq-a{display:none;padding:0 18px 14px;font-size:0.85rem;line-height:1.75;color:var(--muted);}
.faq-item.open .faq-a{display:block;}
.faq-cat-badge{font-size:0.68rem;padding:2px 8px;border-radius:10px;background:var(--blue-soft);color:var(--blue-bright);font-weight:600;white-space:nowrap;}
.no-results{text-align:center;padding:40px;color:var(--muted);font-size:0.88rem;}
footer{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);padding:8px 16px;text-align:center;font-size:0.72rem;color:var(--muted);}
footer a{color:var(--muted);text-decoration:none;margin:0 5px;}
footer a:hover{color:var(--blue-bright);}
</style>
</head>
<body>
<header>
  <a href="index.html" class="logo">Universal<span>Calculator</span></a>
  <nav style="margin-left:auto;display:flex;gap:12px;font-size:0.8rem">
    <a href="universal-calculator.html" style="color:var(--muted);text-decoration:none">Alle Rechner</a>
    <a href="blog.html" style="color:var(--muted);text-decoration:none">Wissenswertes</a>
    <a href="hilfe.html" style="color:var(--blue-bright);text-decoration:none">Hilfe</a>
  </nav>
</header>
<main>
  <h1 class="page-title">Häufige Fragen</h1>
  <p class="page-sub">Antworten auf die häufigsten Fragen zu unseren Rechnern.</p>

  <div class="search-bar">
    <input id="faq-search" type="text" placeholder="Frage suchen …" oninput="filterFaq()">
  </div>
  <div class="filters" id="faq-filters"></div>
  <div id="faq-list"></div>
</main>

<footer>
  <div>
    <a href="universal-calculator.html">Rechner</a> |
    <a href="blog.html">Wissenswertes</a> |
    <a href="faq.html">FAQ</a> |
    <a href="hilfe.html">Hilfe</a> |
    <a href="impressum.html">Impressum</a> |
    <a href="datenschutz.html">Datenschutz</a>
  </div>
  <div style="margin-top:2px">© 2026 Universal-Calculator · Alle Berechnungen erfolgen lokal im Browser · Keine Garantie auf Richtigkeit</div>
</footer>

<script>
const FAQS = [
  {cat:'Allgemein', q:'Sind alle Rechner kostenlos?', a:'Ja, alle Rechner auf Universal-Calculator sind vollständig kostenlos und ohne Registrierung nutzbar. Die Website wird durch Werbeeinblendungen (Google AdSense) finanziert.'},
  {cat:'Allgemein', q:'Werden meine Eingabedaten gespeichert?', a:'Nein. Alle Berechnungen finden ausschließlich lokal in Ihrem Browser statt. Ihre Eingaben werden weder an unsere Server übertragen noch gespeichert.'},
  {cat:'Allgemein', q:'Funktionieren die Rechner auch offline?', a:'Die Rechner selbst funktionieren nach dem ersten Laden auch offline, da alle Berechnungen in JavaScript lokal ausgeführt werden. Google Fonts und Werbeanzeigen benötigen jedoch eine Internetverbindung.'},
  {cat:'Allgemein', q:'Auf welchen Geräten kann ich die Rechner nutzen?', a:'Alle Rechner sind für Desktop, Tablet und Smartphone optimiert. Sie funktionieren in allen modernen Browsern (Chrome, Firefox, Safari, Edge) ohne Installation.'},
  {cat:'Allgemein', q:'Wie genau sind die Berechnungen?', a:'Die Berechnungen basieren auf anerkannten mathematischen Formeln und sind für allgemeine Informationszwecke gedacht. Für rechtlich oder medizinisch relevante Entscheidungen empfehlen wir, einen Fachberater hinzuzuziehen. Keine Garantie auf Richtigkeit.'},
  {cat:'Finanzen', q:'Wie funktioniert der Zinseszinsrechner?', a:'Der Zinseszinsrechner verwendet die Formel K(t) = K₀ × (1 + p/100)^t, wobei K₀ das Startkapital, p der jährliche Zinssatz und t die Laufzeit in Jahren ist. Optional können Sie eine monatliche Sparrate angeben, die zum Endkapital beiträgt.'},
  {cat:'Finanzen', q:'Sind die Wechselkurse im Währungsrechner aktuell?', a:'Die Wechselkurse sind statische Richtkurse (Stand 2026). Für aktuelle Kurse für Finanztransaktionen konsultieren Sie bitte Ihre Bank oder ein Finanzdatenportal. Die Kurse dienen nur zur Orientierung.'},
  {cat:'Finanzen', q:'Wie berechnet der Gehaltsrechner das Nettoeinkommen?', a:'Der Gehaltsrechner verwendet vereinfachte Näherungsformeln für Deutschland (2025). Die tatsächliche Nettolohnabrechnung hängt von vielen individuellen Faktoren ab. Für genaue Berechnungen nutzen Sie bitte einen offiziellen Brutto-Netto-Rechner oder wenden Sie sich an einen Steuerberater.'},
  {cat:'Finanzen', q:'Was bedeutet ROI?', a:'ROI (Return on Investment) ist eine Kennzahl, die das Verhältnis von Gewinn zu eingesetztem Kapital beschreibt. ROI = (Ertrag − Investition) / Investition × 100 %. Ein ROI von 35 % bedeutet, dass Sie 35 Cent Gewinn pro investiertem Euro erzielt haben.'},
  {cat:'Gesundheit', q:'Wie wird der BMI berechnet?', a:'Der Body-Mass-Index (BMI) wird berechnet als: BMI = Körpergewicht (kg) ÷ Körpergröße² (m²). Ein BMI von 18,5–24,9 gilt als Normalgewicht. Der BMI ist eine grobe Orientierung und berücksichtigt nicht Muskelmasse, Alter oder Körperbau.'},
  {cat:'Gesundheit', q:'Was ist der Unterschied zwischen BMR und TDEE?', a:'BMR (Basal Metabolic Rate / Grundumsatz) ist die Energiemenge, die Ihr Körper in absoluter Ruhe benötigt. TDEE (Total Daily Energy Expenditure / Gesamtumsatz) berücksichtigt zusätzlich Ihre körperliche Aktivität und ist Ihr tatsächlicher Kalorienbedarf pro Tag.'},
  {cat:'Gesundheit', q:'Ist der Schwangerschaftsrechner medizinisch verlässlich?', a:'Der Rechner berechnet den voraussichtlichen Geburtstermin nach der Naegele-Regel (Erste Tag der letzten Regel + 280 Tage, angepasst an Zykluslänge). Dies ist eine Schätzung. Der tatsächliche Geburtstermin wird von einem Arzt per Ultraschall präzise ermittelt.'},
  {cat:'Datum & Zeit', q:'Wie berechnet der Datumsrechner Arbeitstage?', a:'Der Urlaubstagerechner zählt alle Wochentage (Montag–Freitag) zwischen zwei Daten. Gesetzliche Feiertage werden nicht berücksichtigt, da diese je nach Bundesland variieren.'},
  {cat:'Datum & Zeit', q:'Funktioniert der Countdown auch im Hintergrund?', a:'Ja, der JavaScript-Timer läuft weiter, solange der Browser-Tab geöffnet ist. Wenn Sie den Tab schließen oder den Browser beenden, stoppt der Countdown. Ein erneutes Aufrufen der Seite startet ihn neu.'},
  {cat:'Einheiten', q:'Welche Währungen sind im Umrechner verfügbar?', a:'Aktuell sind über 30 Währungen verfügbar, darunter EUR, USD, GBP, CHF, JPY, CNY, CAD, AUD und viele mehr. Die Kurse sind statische Richtkurse aus 2026.'},
  {cat:'Einheiten', q:'Wie rechne ich Celsius in Fahrenheit um?', a:'Die Formel lautet: °F = (°C × 9/5) + 32. Beispiel: 100°C = 212°F. Umgekehrt: °C = (°F − 32) × 5/9. Unser Temperaturrechner unterstützt auch Kelvin und Rankine.'},
  {cat:'Physik', q:'Was berechnet das Ohmsche Gesetz?', a:'Das Ohmsche Gesetz beschreibt den Zusammenhang zwischen Spannung U (Volt), Stromstärke I (Ampere) und Widerstand R (Ohm): U = R × I. Daraus ergibt sich auch die Leistung: P = U × I. Unser Rechner berechnet automatisch die fehlende Größe aus den drei bekannten.'},
  {cat:'Physik', q:'Was ist der Unterschied zwischen Reihen- und Parallelschaltung von Widerständen?', a:'Bei Reihenschaltung addieren sich die Widerstände: R_ges = R₁ + R₂ + … Bei Parallelschaltung ist der Kehrwert der Summe der Kehrwerte: 1/R_ges = 1/R₁ + 1/R₂ + … Bei Parallelschaltung ist der Gesamtwiderstand stets kleiner als der kleinste Einzelwiderstand.'},
  {cat:'Sonstiges', q:'Ist der Passwortgenerator sicher?', a:'Ja. Der Passwortgenerator verwendet die kryptografisch sichere Web Crypto API (crypto.getRandomValues()), die in allen modernen Browsern verfügbar ist. Die Passwörter werden nur lokal im Browser erzeugt und niemals übertragen oder gespeichert.'},
  {cat:'Sonstiges', q:'Wie funktioniert der HEX-zu-RGB-Konverter?', a:'HEX-Farbcodes (z.B. #1BA6FF) bestehen aus drei Farbkanälen: Rot (1B = 27), Grün (A6 = 166), Blau (FF = 255). Jeder Kanal wird von hexadezimal in dezimal umgewandelt. Unser Rechner konvertiert zusätzlich in HSL (Farbton, Sättigung, Helligkeit) und zeigt eine Farbvorschau.'},
  {cat:'Sonstiges', q:'Was bedeutet die Reifenbezeichnung 205/55 R16?', a:'205 = Reifenbreite in mm · 55 = Querschnittsverhältnis (Seitenwandhöhe = 55 % der Breite) · R = Radialreifen · 16 = Felgendurchmesser in Zoll. Unser Rechner berechnet daraus Gesamtdurchmesser und Abrollumfang.'},
];

const cats = ['Alle', ...new Set(FAQS.map(f=>f.cat))];
let activecat = 'Alle';

function renderFilters() {
  document.getElementById('faq-filters').innerHTML = cats.map(c =>
    `<button class="filter-btn${c===activecat?' active':''}" onclick="setCat('${c}')">${c}</button>`
  ).join('');
}

function setCat(c) {
  activecat = c;
  renderFilters();
  filterFaq();
}

function filterFaq() {
  const q = document.getElementById('faq-search').value.toLowerCase();
  const list = document.getElementById('faq-list');
  const filtered = FAQS.filter(f => {
    const catMatch = activecat === 'Alle' || f.cat === activecat;
    const textMatch = !q || f.q.toLowerCase().includes(q) || f.a.toLowerCase().includes(q);
    return catMatch && textMatch;
  });
  if (!filtered.length) {
    list.innerHTML = '<div class="no-results">Keine Ergebnisse gefunden. Bitte andere Suchbegriffe versuchen.</div>';
    return;
  }
  list.innerHTML = filtered.map((f, i) => `
    <div class="faq-item" id="faq-${i}">
      <div class="faq-q" onclick="toggleFaq('faq-${i}')">
        <span>${f.q} <span class="faq-cat-badge">${f.cat}</span></span>
        <span class="faq-arrow">▼</span>
      </div>
      <div class="faq-a">${f.a}</div>
    </div>
  `).join('');
}

function toggleFaq(id) {
  const el = document.getElementById(id);
  if (el) el.classList.toggle('open');
}

renderFilters();
filterFaq();
</script>
</body>
</html>
