<style>
:root{--bg-deep:#F6F8FC;--surface:#FFFFFF;--text:#1F2937;--muted:#6B7280;--blue-bright:#1BA6FF;--blue-soft:#E8F4FF;--copper:#C77A4A;--copper-soft:#F3E3DA;--border:#E5E7EB}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Mono',monospace;background:var(--bg-deep);background-image:linear-gradient(rgba(27,166,255,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(27,166,255,.06) 1px,transparent 1px);background-size:40px 40px;color:var(--text);min-height:100vh;padding:0 0 90px}
h1,h2,h3,h4,button{font-family:'Space Grotesk',sans-serif}
header{background:#fff;border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;gap:12px}
.logo{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:1.1rem;color:var(--blue-bright);text-decoration:none}
.logo span{color:var(--copper)}
main{max-width:760px;margin:32px auto;padding:0 20px}
.card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:28px 32px;margin-bottom:20px}
h1{font-size:1.6rem;font-weight:700;margin-bottom:6px}
h2{font-size:1.05rem;font-weight:600;margin:20px 0 8px;color:var(--blue-bright)}
h2:first-child{margin-top:0}
p{font-size:.86rem;line-height:1.8;margin-bottom:10px;color:var(--muted)}
p:last-child{margin-bottom:0}
p strong{color:var(--text)}
a{color:var(--blue-bright);text-decoration:none}
.meta{font-size:.75rem;color:var(--muted);margin-bottom:20px}
/* contact cards grid */
.contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:4px}
@media(max-width:520px){.contact-grid{grid-template-columns:1fr}}
.contact-card{display:flex;align-items:flex-start;gap:14px;background:var(--bg-deep);border:1px solid var(--border);border-radius:10px;padding:18px 20px;text-decoration:none;color:inherit;transition:border-color .15s,box-shadow .15s}
.contact-card:hover{border-color:var(--blue-bright);box-shadow:0 2px 12px rgba(27,166,255,.1)}
.contact-card.highlight{border-color:rgba(27,166,255,.3);background:var(--blue-soft)}
.cc-icon{width:40px;height:40px;border-radius:8px;background:#fff;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.contact-card.highlight .cc-icon{background:var(--blue-bright);border-color:var(--blue-bright)}
.cc-body{}
.cc-title{font-family:'Space Grotesk',sans-serif;font-size:.9rem;font-weight:700;color:var(--text);margin-bottom:3px}
.cc-value{font-size:.82rem;color:var(--blue-bright);margin-bottom:4px}
.cc-note{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
</style>

function renderPage(lang) {
  var d = PD[lang] || PD.de;
  var cardsHtml = d.cards.map(function(c) {
    return '<a href="' + c.href + '" class="contact-card' + (c.highlight ? ' highlight' : '') + '">' +
      '<div class="cc-icon">' + c.icon + '</div>' +
      '<div class="cc-body">' +
        '<div class="cc-title">' + c.title + '</div>' +
        '<div class="cc-value">' + c.value + '</div>' +
        '<div class="cc-note">' + c.note + '</div>' +
      '</div>' +
    '</a>';
  }).join('');

  document.getElementById('page-main').innerHTML =
    '<div class="card">' +
      '<h1>' + d.title + '</h1>' +
      '<p class="meta">' + d.subtitle + '</p>' +
      '<div class="contact-grid">' + cardsHtml + '</div>' +
    '</div>' +
    '<div class="card">' +
      '<h2>' + d.infoTitle + '</h2>' +
      '<p>' + d.infoBody + '</p>' +
    '</div>';
}
