function renderPage(lang) {

function checkWikiQuiz(answers, passMsg, failMsg) {
  const form = document.getElementById('wiki-quiz');
  let correct = 0;
  answers.forEach(function(ans, i) {
    const sel = form.querySelector(`input[name="q${i}"]:checked`);
    if (sel && parseInt(sel.value) === ans) correct++;
  });
  const res = document.getElementById('wiki-quiz-res');
  res.className = 'quiz-result show ' + (correct === answers.length ? 'pass' : 'fail');
  res.textContent = correct + '/' + answers.length + ' — ' + (correct === answers.length ? passMsg : failMsg);
}
