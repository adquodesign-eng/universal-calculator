<style>
:root{--bg-deep:#F6F8FC;--surface:#FFFFFF;--text:#1F2937;--muted:#6B7280;--blue-bright:#1BA6FF;--blue-soft:#E8F4FF;--copper:#C77A4A;--copper-soft:#F3E3DA;--border:#E5E7EB}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Mono',monospace;background:var(--bg-deep);background-image:linear-gradient(rgba(27,166,255,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(27,166,255,.06) 1px,transparent 1px);background-size:40px 40px;color:var(--text);min-height:100vh;padding:0 0 90px}
h1,h2,h3,h4,button{font-family:'Space Grotesk',sans-serif}

.logo span{color:var(--copper)}
main{max-width:860px;margin:32px auto;padding:0 20px}
.page-title{font-size:1.8rem;font-weight:700;margin-bottom:6px}
.page-sub{color:var(--muted);font-size:.85rem;margin-bottom:28px}
.topic-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;margin-bottom:36px}
.topic-tile{background:#fff;border:1px solid var(--border);border-radius:10px;padding:18px 20px;cursor:pointer;transition:.15s;text-decoration:none;display:block}
.topic-tile:hover{border-color:var(--blue-bright);box-shadow:0 2px 10px rgba(27,166,255,.12)}
.topic-tile .icon{font-size:1.8rem;margin-bottom:8px}
.topic-tile h3{font-size:.95rem;font-weight:600;color:var(--text);margin-bottom:4px}
.topic-tile p{font-size:.75rem;color:var(--muted);line-height:1.5}
.section{background:#fff;border:1px solid var(--border);border-radius:10px;margin-bottom:16px;overflow:hidden}
.section-hdr{padding:16px 20px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-weight:600;font-size:1rem}
.section-hdr:hover{background:var(--blue-soft)}
.section-body{display:none;padding:4px 20px 20px}
.section.open .section-body{display:block}
.arrow{transition:transform .2s;font-size:.8rem}
.section.open .arrow{transform:rotate(180deg)}
.steps{counter-reset:step;margin-top:12px}
.step{display:flex;gap:14px;margin-bottom:16px;align-items:flex-start}
.step-num{counter-increment:step;background:var(--blue-bright);color:#fff;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:.8rem;min-width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.step-num::before{content:counter(step)}
.step-body h4{font-size:.9rem;font-weight:600;margin-bottom:4px}
.step-body p{font-size:.83rem;line-height:1.7;color:var(--muted)}
.tip{background:var(--blue-soft);border-left:3px solid var(--blue-bright);border-radius:0 6px 6px 0;padding:10px 14px;margin:12px 0;font-size:.82rem;line-height:1.6}
.warn{background:var(--copper-soft);border-left:3px solid var(--copper);border-radius:0 6px 6px 0;padding:10px 14px;margin:12px 0;font-size:.82rem;line-height:1.6}
.sub-h{font-size:.95rem;font-weight:600;margin:16px 0 8px}
@media(max-width:600px){.topic-grid{grid-template-columns:1fr 1fr}}
</style>

      return `<div class="step"><div class="step-num"></div><div class="step-body"><h4>${st.h}</h4><p>${st.p}</p></div></div>`;
    }).join('');
    let extra = '';
    if (s.tip) extra += `<div class="tip">${s.tip}</div>`;
    if (s.warn) extra += `<div class="warn">${s.warn}</div>`;
    return `<div class="section" id="sec-${s.id}">
      <div class="section-hdr" onclick="toggleSection('${s.id}')">
        <span>${s.title}</span><span class="arrow">▼</span>
      </div>
      <div class="section-body">
        <div class="steps">${stepsHtml}</div>
        ${extra}
      </div>
    </div>`;
  }).join('');
  
  main.innerHTML = `
    <h1 class="page-title">${d.title}</h1>
    <p class="page-sub">${d.sub}</p>
    <div class="topic-grid">${tilesHtml}</div>
    ${sectionsHtml}
  `;
  
  // open section from hash
  const hash = location.hash.replace('#','');
  if (hash) {
    const el = document.getElementById('sec-' + hash);
    if (el) { el.classList.add('open'); el.scrollIntoView({behavior:'smooth'}); }
  }
}

function toggleSection(id) {
  const el = document.getElementById('sec-' + id);
  if (el) el.classList.toggle('open');
}
</script>

function setLang(l) {

  } catch(e) {}
  applyNav(l);
  if (typeof renderPage === 'function') renderPage(l);
}

function getLang() {
  try {

    if (p.get('lang')) return p.get('lang');
